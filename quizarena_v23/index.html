   options:["Carbon performance (emissions intensity vs. sectoral pathway) and management quality — carbon performance most directly links to stranding risk","Revenue growth and market share — revenue trajectory is the primary indicator of transition preparedness","ESG rating and total carbon footprint — both equally relevant, neither alone sufficient","Board diversity and climate disclosure quality — governance factors are the primary determinant of stranding"],
   correct:0, explanation:"TPI dimensions: management quality (governance maturity) and carbon performance (emissions vs. decarbonisation pathway). Carbon performance is most directly linked to stranding risk — high-intensity companies face greatest exposure to carbon pricing and regulation." },

  { question:"A ratings analyst assessing the systemic implications of a California insurer withdrawing from wildfire-prone markets identifies which financial transmission mechanism most accurately describes the systemic risk pathway?",
   options:["Insurance withdrawal has no systemic implications as homeowners can self-insure or access federal programmes","Insurance withdrawal → uninsurability → unmortgageability → property value decline → bank collateral impairment → potential systemic credit losses","Insurance withdrawal is positive for financial stability — it signals proper risk pricing and encourages migration from hazardous areas","Insurance withdrawal only affects wealthy homeowners in high-risk areas, with negligible systemic impact"],
   correct:1, explanation:"Key transmission: uninsurability → unmortgageability → value collapse → bank collateral impairment. This physical-to-financial transmission is an emerging systemic risk in California, Florida, and Australia." },

  { question:"A mining company board is discussing stranding risk for its German coal operations. The Datteln 4 plant is cited as an example. What type of stranding mechanism does Datteln 4 illustrate?",
   options:["Physical stranding — the plant was damaged by flooding and rendered inoperable by a climate event","Technological stranding — cheaper renewables made the plant economically obsolete before its design life","Market stranding — falling electricity demand reduced revenues below long-run marginal operating costs","Regulatory stranding — coal phase-out legislation prematurely curtailed the plant's commercial life despite it being newly built"],
   correct:3, explanation:"Datteln 4: commissioned 2020, but Germany's Coal Phase-Out Act (2020) set a 2038 backstop, dramatically shortening expected commercial life. This is regulatory stranding — policy action forces premature retirement." },

  { question:"A bank's credit risk team integrating physical climate risk into probability of default modelling for a food manufacturer in a drought-prone region asks which methodology is most appropriate.",
   options:["Physical risk does not affect PD — food companies pass commodity cost increases to consumers","Physical risk only affects LGD through collateral damage, not the borrower's debt service capacity","Physical risk should be treated as an insurance matter and excluded from internal PD models entirely","Physical risk shifts the PD distribution — drought impairs input availability, raises costs, compresses margins, and can damage assets — all increasing default probability"],
   correct:3, explanation:"Climate risk shifts the full PD distribution: revenue impairment (input scarcity) + cost inflation + asset impairment all increase default probability. ECB and McKinsey work has demonstrated this methodology for banks." },

  { question:"A pension fund actuary argues that annual NAV revaluation of the infrastructure portfolio already captures climate risks, making a dedicated physical climate risk assessment unnecessary. What is the most compelling counter-argument?",
   options:["NAV revaluation is too expensive and should be replaced entirely by the physical risk assessment","NAV captures current prices which may not yet reflect long-term physical risks — markets may misprice decades-out risk, and acute events are path-dependent and not in steady-state valuations","NAV revaluation and physical risk assessment are identical — there is no gap between the two","Physical climate risk only becomes material for assets with design lives exceeding 100 years"],
   correct:1, explanation:"Markets may not yet price long-term physical risk (climate Minsky moment risk). NAV is backward-looking. Physical risk assessments use forward-looking scenario analysis not captured in current market prices." },

  { question:"A structured finance team pricing a Southeast Asian typhoon catastrophe bond asks whether historical tropical cyclone data from 1980–2020 is a reliable pricing basis for investors.",
   options:["Historical 1980–2020 data is the gold standard for cat bond pricing and requires no climate adjustment","Climate change reduces tropical cyclone frequency so historical data overstates risk — pricing is already too conservative","Cat bonds cannot incorporate climate change because it violates actuarial independence principles","Historical data from a cooler climate period understates future trigger probability — intensification of peak cyclones may cause mispricing"],
   correct:3, explanation:"Climate change is expected to intensify peak tropical cyclone intensity (Cat 4–5) even if overall frequency decreases. Historical data from a cooler climate underestimates future physical hazard, creating pricing risk for cat bond investors." },

  { question:"A European utility's CFO asks a climate litigation specialist to explain the primary legal basis for shareholder climate disclosure suits and which case established a key precedent.",
   options:["Climate litigation is based solely on environmental law and cannot be brought by shareholders","Securities disclosure law — companies must disclose material risks; ClientEarth v. Shell directors (2023) targeted board fiduciary duties around inadequate climate strategy","Litigation risk is entirely hypothetical — no company has yet been found liable for climate-related disclosure failures","The primary basis is tort law holding companies liable for their proportional share of all global CO₂ emissions"],
   correct:1, explanation:"Climate litigation uses multiple legal bases. ClientEarth v. Shell directors (2023) is a key precedent targeting board-level fiduciary duties. Securities disclosure law (material risk disclosure) is the most common current approach." },

  { question:"A bank analyst building a sectoral transition risk heat map needs to identify which sector would most appropriately be classified 'highest transition risk' based on carbon intensity and regulatory sensitivity.",
   options:["Software and technology — high margins allow easy absorption of carbon pricing costs","Consumer staples — commodity cost pass-through insulates the sector from transition risk","Healthcare — protected from climate policy by sector-specific healthcare regulation","Coal-heavy utilities — directly exposed to carbon pricing, renewable competition, regulatory phase-out, and highest stranded asset risk"],
   correct:3, explanation:"Coal-heavy utilities score highest on all transition risk dimensions: direct carbon pricing, regulatory phase-out risk, technological displacement by renewables, and greatest stranded asset concentration." },

  { question:"A sovereign pension fund's risk committee asks for a concrete example of how a drought in one country could affect the fund's holdings in a different country through a second-order physical risk transmission channel.",
   options:["A drought in Australia directly damages Australian real estate — this is second-order transmission","Brazil drought → reduced soy exports → global food commodity price spike → food inflation → central bank rate hikes → bond portfolio mark-to-market losses","Second-order climate risk only applies to derivative instruments, not physical assets","Second-order risk means the risk worsens in the second period of a two-period climate stress test model"],
   correct:1, explanation:"Second-order channels: climate event → commodity price shock → inflation → monetary policy response → asset price impact. This supply-chain-to-macroeconomic transmission is modelled in NGFS scenarios and is key for diversified portfolios." }
],

ch4: [
  { question:"An international law firm advises a German conglomerate on whether missing Germany's nationally determined contribution targets under the Paris Agreement would expose the government to international legal liability. What is technically accurate?",
   options:["Paris Agreement legally binds procedural requirements (submit, report, ratchet NDCs) but the specific targets are nationally determined and internationally unenforceable","Paris Agreement is fully legally binding including specific NDC emission targets — missing them creates international liability","Paris Agreement has no legal effect — it is a political declaration only","Paris Agreement creates criminal liability for government officials who miss NDC targets"],
   correct:0, explanation:"Paris Agreement: legally binding procedure (submit NDCs, global stocktake every 5 years) but targets are nationally determined and not internationally enforceable. Domestic climate legislation like the UK Climate Change Act creates binding domestic obligations." },

  { question:"A sustainability team building a GHG inventory has a 60% equity stake in a manufacturing JV they do not operationally control. Which approach results in reporting 60% of the JV's emissions, and which reports 100%?",
   options:["Location-based = 100%; market-based = 60%","Equity share approach = 60% (proportional to ownership); operational control approach = 100% if control exists, 0% if not","Scope 1 accounting = 60%; Scope 2 accounting = 100%","Financial control approach always equals equity share regardless of operational control"],
   correct:1, explanation:"GHG Protocol: equity share = proportional to ownership stake. Operational control = 100% of entities you control, 0% you don't. Financial control = 100% where consolidated financially. Three different approaches, three different outcomes." },

  { question:"A government client asks an economist to compare carbon taxes and ETS: which mechanism provides greater price certainty for businesses, and which provides greater quantity certainty on total emissions?",
   options:["ETS provides price certainty by fixing permit supply; carbon tax provides quantity certainty by fixing total emissions","Both mechanisms provide identical price and quantity certainty when designed correctly","Carbon tax provides price certainty (businesses know the cost); ETS provides quantity certainty (the cap fixes total emissions allowed)","Carbon taxes always dominate because they eliminate all price and quantity regulatory uncertainty"],
   correct:2, explanation:"Classic Weitzman analysis: carbon tax = price certainty (known cost, uncertain quantity outcome); ETS = quantity certainty (cap fixes total emissions, permit price is uncertain). This trade-off is fundamental to policy design." },

  { question:"Private pension fund investors ask why clean energy projects in sub-Saharan Africa require MDB blended finance rather than private capital alone. What is the most accurate explanation?",
   options:["Private capital is legally prohibited from investing in developing country infrastructure projects","MDB capital is cheaper because MDBs do not pay taxes, making blended finance always superior on cost","Risk-adjusted returns are insufficient for private hurdle rates due to political risk, small project scale, and currency risk — MDB concessional first-loss tranches bring risk to commercially acceptable levels","Blended finance is inefficient and destroys value; all climate finance should come from pure private sources"],
   correct:2, explanation:"Blended finance rationale: structural market failures in developing markets (political risk, thin capital markets, currency risk, small project size) mean risk-adjusted returns fall below private hurdle rates. Concessional capital absorbs risk to crowd in commercial investors." },

  { question:"A board member asks which EU regulation primarily targets financial market participants and advisors, requiring them to disclose how ESG risks are integrated into investment decisions and classify products by sustainability ambition.",
   options:["CSRD — the Corporate Sustainability Reporting Directive targets financial market participants","EU Taxonomy Regulation — requires financial market participants to disclose taxonomy alignment","SFDR — requires financial market participants and advisors to disclose ESG integration and classify products under Article 6, 8, or 9","TCFD — an EU regulation specifically targeting financial advisors and investment managers"],
   correct:2, explanation:"SFDR targets financial market participants and advisors. CSRD targets large non-financial companies. EU Taxonomy defines 'green' activities. TCFD is a voluntary framework (not EU regulation). Each has a distinct regulatory scope." },

  { question:"A bank's trade finance team is briefed on the EU Carbon Border Adjustment Mechanism (CBAM). A board member asks what CBAM means for clients importing steel, cement, and aluminium into the EU from non-EU countries.",
   options:["CBAM is a tariff applying uniformly to all imports regardless of carbon intensity of production","CBAM requires importers to buy certificates for embedded carbon in specified goods, equal to the EU ETS price minus any carbon cost already paid in the country of origin","CBAM has no impact on trade finance — it only affects government customs revenue collection","CBAM only applies to goods from countries that have not signed the Paris Agreement"],
   correct:1, explanation:"CBAM (transitional phase Oct 2023, full Jan 2026): importers pay for embedded carbon in steel, cement, aluminium, fertilisers, hydrogen, electricity. Certificate price = EU ETS price minus carbon cost already paid at origin — levels the playing field." },

  { question:"A state-owned enterprise CEO asks whether joining SBTi obligates the company to cover Scope 3 emissions and what happens if submitted targets fail SBTi's validation review.",
   options:["SBTi is fully self-certified — no external validation is required and all targets are automatically accepted","Membership covers only Scope 1 emissions — Scope 3 is optional and rejection has no consequences","SBTi requires 100% reduction by 2025 and all scopes from day one with no exceptions","If Scope 3 exceeds 40% of total emissions (as it usually does), Scope 3 targets are required; rejection of targets means no SBTi badge and investor/stakeholder scrutiny"],
   correct:3, explanation:"SBTi: if Scope 3 > 40% of total, Scope 3 targets required. Independent validation required. Failed validation = no SBTi badge. This credibility mechanism distinguishes SBTi from unvalidated net-zero pledges." },

  { question:"A sovereign bond analyst assesses the 'fiscal cliff' risk for a Gulf state where 70% of government revenues derive from oil exports under a rapid energy transition scenario.",
   options:["Fossil-fuel-dependent sovereigns face no additional credit risk — OPEC manages oil price stability","The fiscal cliff only affects coal-dependent economies; oil-dependent nations are protected by petrochemical diversification","Rapid transition reduces fossil fuel demand faster than these economies can diversify, creating a structural revenue collapse that threatens sovereign debt serviceability","Sovereigns can always print money to service debt, so fossil-fuel dependence creates no creditworthiness risk"],
   correct:2, explanation:"Fossil-fuel sovereign fiscal cliff: transition reduces hydrocarbon revenues before economic diversification. For governments with 60–90% oil revenue dependence, this creates genuine sovereign creditworthiness risk modelled in NGFS transition scenarios." },

  { question:"A compliance officer needs to brief the board on why several major US banks exited the Net Zero Banking Alliance (NZBA) in early 2025 and what this means for their own membership considerations.",
   options:["US banks exited because NZBA was insufficiently ambitious — they adopted more stringent unilateral targets","NZBA was dissolved by the UN following inadequate progress — all members had to exit simultaneously","US banks must exit NZBA because membership requires full fossil fuel divestment conflicting with US banking law","US banks exited due to antitrust concerns and political/legal pressure; NZBA subsequently revised its ambition from 1.5°C to 'well below 2°C'"],
   correct:3, explanation:"US bank NZBA exits (2025): driven by antitrust concerns, ESG political backlash, Republican AG investigations. NZBA revised language to 'well below 2°C' to accommodate remaining members. Key example of climate commitment vs. political risk trade-off." },

  { question:"A climate finance specialist structuring a sovereign sustainability-linked bond linked to NDC achievement asks why this structure offers stronger market credibility than a standard sovereign green bond.",
   options:["The step-up coupon creates a direct financial penalty for missing climate commitments — unlike green bonds where there is no financial consequence for missing targets (only use-of-proceeds reporting)","Sovereign SLBs always have lower yields than green bonds because sustainability metrics reduce credit risk","Sovereign SLBs are simpler to issue than green bonds because no use-of-proceeds reporting is required","Linking bonds to NDC targets violates Paris Agreement rules on nationally determined contributions"],
   correct:0, explanation:"SLB innovation: step-up coupon = financial penalty for missed KPIs. Creates real accountability that green bonds lack. Chile's NDC-linked SLB (2022) is the precedent — financial outcome depends on climate performance, not just use of proceeds." }
],

ch5: [
  { question:"A fixed income manager comparing a green bond and sustainability-linked bond from the same issuer asks which structure provides stronger assurance that capital actually contributes to emission reductions.",
   options:["SLBs are stronger because the step-up penalty creates real financial consequences for underperformance","Green bonds are stronger — ring-fenced proceeds plus annual allocation and impact reporting create direct project linkage; SLBs have no use-of-proceeds restriction","Both structures are identical in accountability — ICMA principles apply equally to both instruments","SLBs are weaker because they are structurally complex and rarely verified by second-party opinion providers"],
   correct:1, explanation:"Green bonds: ring-fenced proceeds + allocation/impact reporting = direct project linkage. SLBs: general-purpose proceeds + financial penalty for KPI miss. Green bonds have stronger assurance on capital destination; SLBs have stronger financial incentive alignment." },

  { question:"A steel producer emitting 150 million tCO₂/year wants to raise capital for a hydrogen direct-reduction steelmaking pilot. Would a standard green bond or transition bond be more appropriate?",
   options:["Green bonds require the activity to already qualify as 'green'; transition bonds are designed for hard-to-abate sectors making credible progress from high-emission baselines","Standard green bond is always preferable — it has a larger investor base and lower cost of capital","Transition bonds are prohibited under EU Taxonomy because they fund non-green activities","Both instruments are equivalent — the distinction is purely a marketing and branding decision"],
   correct:0, explanation:"Green bonds: for activities that are already green. Transition bonds: for hard-to-abate sector companies with credible decarbonisation trajectories. Hydrogen DRI steel = classic transition finance use case — the sector is not yet green but is transitioning." },

  { question:"A compliance team reviewing a fund marketed as 'investing in companies tackling climate change' finds it holds 30% fossil fuels and 20% technology companies with no climate products. What finding is most relevant to a greenwashing assessment?",
   options:["Greenwashing rules apply only to product labels like 'green bond', not to fund marketing materials","The marketing claim implies a climate mandate; if the portfolio cannot demonstrate material climate contribution, this may constitute greenwashing under ESMA's fund naming guidelines","The 30% fossil fuel allocation is automatically disqualifying — any climate fund with fossil fuel exposure is greenwashing","Greenwashing is only a reputational risk and carries no legal consequences for asset managers"],
   correct:1, explanation:"ESMA draft guidelines on fund names (2024): funds using 'ESG', 'climate' etc. must ensure meaningful alignment. 30% fossil fuels in a 'climate-focused' fund creates material greenwashing risk under both SFDR product claims and ESMA naming conventions." },

  { question:"A sovereign debt manager asks what the minimum requirements are for a green bond to comply with the ICMA Green Bond Principles. Which four-component answer is correct?",
   options:["Annual financial reporting; a green committee; credit enhancement; and a prospectus filing","Use of proceeds (defined categories); process for project evaluation and selection; management of proceeds (ring-fenced tracking); and reporting (allocation and impact)","External review; index listing; sustainability committee; and investor reporting","SBT commitment; audited carbon accounts; external auditor; and sustainability-linked coupon"],
   correct:1, explanation:"ICMA GBP four core components: (1) Use of Proceeds, (2) Process for Project Evaluation and Selection, (3) Management of Proceeds, (4) Reporting. External review (SPO) is strongly recommended but not a mandatory requirement." },

  { question:"An investment committee asks a consultant to explain the key difference between ESG integration and best-in-class screening, specifically which approach suits a fund wanting sectoral breadth while improving ESG quality.",
   options:["ESG integration embeds ESG in financial analysis; best-in-class selects highest ESG-rated companies within each sector — best-in-class maintains sector breadth while improving quality","They are identical — both analyse ESG ratings and reach the same portfolio outcome regardless of methodology","ESG integration always produces better outcomes because it incorporates more data; best-in-class is inferior","Best-in-class requires divestment from all low-ESG sectors including fossil fuels by definition"],
   correct:0, explanation:"ESG integration: incorporates ESG data into financial analysis without necessarily changing what you hold. Best-in-class: holds the best ESG performers within each sector — maintains sector diversification while improving ESG quality without excluding any sector." },

  { question:"A sovereign wealth fund signatory to PRI wants to file shareholder resolutions at portfolio companies requiring TCFD-aligned climate reports. Is this consistent with PRI Principle 2?",
   options:["Filing resolutions is too aggressive for PRI signatories — PRI only requires passive ESG monitoring","PRI Principles apply only to public equity, not to a diversified multi-asset fund's full portfolio","PRI Principle 2 addresses active ownership through voting and engagement — filing climate resolutions is a direct expression of this principle and is encouraged","Shareholder resolutions are only legally permitted under US securities law and not applicable globally"],
   correct:2, explanation:"PRI Principle 2: be an active owner — incorporate ESG into ownership policies and practices. Filing climate-related shareholder resolutions is a textbook Principle 2 activity, applicable globally where shares are held." },

  { question:"A development bank is issuing a blue bond for sustainable fisheries and ocean conservation in Southeast Asia. A board member asks what distinguishes a blue bond from a standard green bond.",
   options:["Blue bonds are a completely separate instrument class with their own legal framework independent of ICMA GBP","Blue bonds are a type of social bond because they support fishing communities and livelihoods","Blue bonds are a thematic subset of green bonds under the same ICMA GBP framework, with use of proceeds restricted to marine and ocean-based sustainable activities","Blue bonds are prohibited under ICMA because ocean project outcomes are not externally verifiable"],
   correct:2, explanation:"Blue bonds = thematic green bonds. Same ICMA GBP framework applies. Proceeds restricted to ocean/marine categories (sustainable fisheries, marine biodiversity, sustainable shipping). World Bank/Seychelles blue bond (2018) established this category." },

  { question:"A sovereign wealth fund ESG team assesses whether a pumped hydro project that floods a biodiverse valley and displaces an indigenous community qualifies as 'green' under EU Taxonomy. Which principle is most relevant?",
   options:["The project qualifies because pumped hydro is listed as an eligible renewable energy activity","The EU Taxonomy does not apply to infrastructure investments, only to bonds and financial instruments","Do No Significant Harm (DNSH) — even if hydro contributes to climate mitigation (objective 1), it must not significantly harm biodiversity (objective 6) or water (objective 3) — community displacement or ecosystem damage could trigger DNSH failure","The project automatically qualifies because it is a renewable energy storage technology"],
   correct:2, explanation:"DNSH principle: EU Taxonomy requires contribution to at least one objective AND no significant harm to any other. Biodiversity damage, river ecosystem harm, and community displacement could each trigger DNSH failure, disqualifying the project from green classification." },

  { question:"A bank's sustainability team asks whether TCFD scenario analysis requires use of specific mandated scenarios or whether the bank can use its own internally developed scenarios.",
   options:["TCFD requires a scenario at 2°C or lower but does not mandate specific models — banks may use NGFS, IEA, or internal scenarios provided they are credible, transparent, and cover a range of outcomes","TCFD mandates all banks use the NGFS Net Zero 2050 scenario exclusively; other scenarios are non-compliant","TCFD requires at least ten different scenarios to ensure comprehensive climate risk coverage","TCFD does not require scenario analysis for banks — only energy sector companies must comply"],
   correct:0, explanation:"TCFD: scenario analysis must include a 2°C-or-lower scenario. NGFS is most widely used. No specific model is mandated. Banks must explain scenario choices, assumptions, and results transparently. ISSB S2 strengthens but does not mandate specific scenarios." },

  { question:"A hedge fund building a climate alpha strategy based on transition risk mispricing asks which indicator is most reliable as a systematic short signal for high transition risk exposure.",
   options:["Market capitalisation — larger companies face greater absolute transition risk in monetary terms","Carbon intensity relative to sectoral decarbonisation pathways — high-intensity companies most exposed to carbon pricing, regulation, and technological displacement","ESG rating from MSCI or Sustainalytics — the single most reliable transition risk indicator available","CEO climate credentials — companies with climate-committed leadership have measurably lower transition risk"],
   correct:1, explanation:"Carbon intensity relative to sector pathway = most direct transition risk signal. Companies with emissions above their science-based pathway face greatest exposure to carbon pricing, stranded assets, and regulatory tightening. This is the theoretically sound basis for transition risk alpha." }
],

ch6: [
  { question:"A bank's climate risk team explains to the board why climate stress testing fundamentally differs from traditional credit stress testing. Which explanation most accurately identifies the key methodological differences?",
   options:["They are methodologically identical — climate stress tests are credit stress tests with 'climate' in the title","Climate stress tests are simpler than traditional tests because they consider only one risk factor: temperature","No major regulator has mandated climate stress testing — it remains entirely voluntary for all bank sizes","Climate stress tests project forward 10–30 years under non-stationary scenarios, require physical hazard models, and face significant model uncertainty — going far beyond historical macro-economic relationships"],
   correct:3, explanation:"Key differences: long horizon (decades not years), non-stationary scenarios (climate is changing, not mean-reverting), integration of physical science and economic models, significant model uncertainty. EBA 2022 pilot explicitly acknowledged these methodological challenges." },

  { question:"A pension fund's investment committee asks what a portfolio-level Implied Temperature Rating of 2.7°C actually means, and how they should interpret it against their net-zero commitment.",
   options:["ITR 2.7°C means portfolio assets will experience 2.7°C of localised physical warming at their locations","A 2.7°C ITR means if every portfolio company follows its current plans, aggregate emissions are consistent with a 2.7°C world — misaligned with 1.5°C and 2°C targets, requiring engagement or reallocation","Portfolio ITRs above 2°C are meaningless because climate models break down at higher temperatures","ITR is a backward-looking historical performance metric and cannot assess future portfolio alignment"],
   correct:1, explanation:"ITR converts company emission trajectories into implied warming. Portfolio ITR = weighted average. 2.7°C > Paris goals → fund is misaligned. This metric sets engagement priorities and tracks progress toward net-zero portfolio commitments." },

  { question:"A new hire asks a senior analyst to explain the first step in the McKinsey climate risk counterparty assessment process used to triage 2,500 corporate borrowers efficiently.",
   options:["Use NAICS sector codes to filter and identify high-climate-risk sectors as the first screening step — efficiently triaging counterparties before deeper analysis","Begin with a qualitative assessment of each company's board composition and climate governance maturity","Request audited GHG emissions data from all 2,500 counterparties before conducting any financial analysis","Start with a physical risk GIS mapping exercise for all counterparty facility locations globally"],
   correct:0, explanation:"McKinsey bank case: NAICS sector codes provide efficient first-pass triage of 2,500 counterparties by identifying high-risk sectors (oil & gas, utilities, mining, agriculture). This enables targeted application of more intensive climate risk scorecards." },

  { question:"A fund manager calculating financed emissions under PCAF receives a data quality Score 3 for a corporate bond holding. The CRO asks what Score 3 means and its implications for the reported totals.",
   options:["PCAF Score 3 is highest quality — emissions data has been independently verified with virtually zero margin of error","PCAF scores are pass/fail; Score 3 indicates compliance and has no implication for data uncertainty","PCAF Score 3 uses sector-level economic proxy data — moderate quality with significant estimation error; reported financed emission totals carry meaningful uncertainty ranges that must be disclosed","PCAF Score 3 is the minimum required for SFDR Article 9 funds to report financed emissions"],
   correct:2, explanation:"PCAF data quality: 1 (best — verified company data) to 5 (worst — sector proxy only). Score 3 = economic sector proxy, significant estimation error. Material uncertainty in financed emission totals must be acknowledged in disclosures." },

  { question:"A CRO presenting COSO ERM climate integration to the executive team is asked which COSO component is most relevant for the initial step of understanding how climate change affects the company's business model and competitive environment.",
   options:["Strategy and objective-setting — specifically the strategic landscape evaluation requiring understanding of external climate megatrends that shape business context","Risk assessment — this is where climate risks are identified, quantified, and prioritised","Communication — stakeholders must be informed before any internal assessment can proceed","Monitoring — climate risk requires continuous real-time monitoring as the primary starting point"],
   correct:0, explanation:"COSO ERM Strategy and Objective-Setting: includes 'strategic landscape evaluation' — understanding external megatrends (physical, technological, regulatory, social) that create strategy context. This is the correct starting point for climate risk integration." },

  { question:"An infrastructure bank financing a coal-to-gas transition in an emerging market asks the climate risk team which stranding mechanisms are relevant for a gas-fired plant with a 25-year loan tenor.",
   options:["Only physical stranding risk is relevant — gas plants face no transition risk from policy or technology","Regulatory (carbon pricing), technological (renewables + storage cost curves), and market (efficiency + demand reduction) stranding all apply over 25 years — IEA NZE shows no new gas plants after 2021","Gas cannot be stranded because it is a transition fuel with reliable long-term demand from industrial uses","Only technological stranding applies — renewable costs are falling but regulations are stable for gas plants"],
   correct:1, explanation:"Gas plants with 25-year tenors face all three stranding mechanisms: (1) regulatory (carbon pricing escalation), (2) technological (renewables + storage curves), (3) market (demand reduction from efficiency). IEA Net Zero Emissions scenario makes no new gas development after 2021 in a 1.5°C pathway." },

  { question:"A reinsurance company asks what specific data problem the Global Resilience Index Initiative (GRII) was launched to solve, and how it differs from existing commercial climate data providers.",
   options:["GRII replaces all existing providers with a single government-run platform for standardised risk data","GRII provides carbon pricing data for sovereign and corporate bond analysis globally","GRII addresses fragmentation and inaccessibility of physical hazard, exposure, and vulnerability data — standardising and democratising access needed for robust risk assessment across the public and private sector","GRII is focused exclusively on financial risk modelling with no relevance to physical hazard assessment"],
   correct:2, explanation:"GRII: the core data availability barrier to climate risk assessment is fragmented, non-interoperable data across hazard providers, government agencies, and private vendors. GRII aims to standardise and democratise access to climate and disaster risk data." },

  { question:"A climate specialist challenges a portfolio construction team's use of Weighted Average Carbon Intensity reduction as its primary climate metric, arguing it can be achieved without any real-world emission reduction. What argument best supports the specialist?",
   options:["WACI is the best available metric and the specialist is incorrect — portfolio decarbonisation always implies real-world impact","WACI reduction requires companies to actually reduce emissions — it is impossible to reduce WACI without real-world impact","Selling high-emission stocks and buying low-emission ones reduces WACI without changing what any company actually emits — real impact requires engagement-driven company action","The specialist is right but there are no alternative metrics available to supplement or replace WACI"],
   correct:2, explanation:"Portfolio decarbonisation fallacy: WACI reduction through reallocation doesn't change company emissions — it shifts high-emission asset ownership to other investors. Real impact requires engagement, green capital provision, or policy advocacy that changes company behaviour." },

  { question:"An IT services company's risk manager asks why water availability is a material climate risk for the company's Indian operations despite being in the technology sector, and what risk type this represents.",
   options:["Data centres require significant water for cooling; chronic physical risk (increasing water scarcity from rising temperatures) creates operational continuity risk for facilities-heavy IT companies in water-stressed regions","Water risk is not material for IT companies — it applies only to manufacturing and agriculture sectors","Water risk for IT companies is a social risk related to community water access, not a physical climate risk","This represents transition risk because water regulations and pricing are changing for industrial users"],
   correct:0, explanation:"Infosys case: data centres need water for cooling. India's periodic water stress (chronic physical risk) threatens operational continuity. Physical climate risk extends beyond obvious sectors — physical footprint + water-stressed location = material operational risk." },

  { question:"A board member asks why the NGFS risk matrix classifies operational risk as having 'LIMITED' macro-level systemic risk compared to credit and market risk which are 'SIGNIFICANT'.",
   options:["Operational risk is more severe than credit risk in all climate scenarios and should be reclassified","The NGFS classification is incorrect — operational risk should be upgraded to significant given data centre vulnerabilities","Operational climate losses are firm-specific — a flooded data centre does not automatically cascade through the financial system unlike credit defaults or market repricing which propagate via interconnections","Operational risk is classified as limited because climate does not actually affect company operations"],
   correct:2, explanation:"NGFS logic: operational climate losses are idiosyncratic and firm-specific. They don't propagate through financial system interconnections the way credit defaults or market repricing do. Credit and market risks have systemic amplification mechanisms; operational losses do not." }
],

ch7: [
  { question:"An infrastructure portfolio risk committee asks which NGFS scenario creates the highest COMBINED physical and transition risk, and why it represents the worst outcome for financial stability.",
   options:["Delayed Transition (Disorderly) — late, sudden policy action creates high transition risk while accumulated warming creates elevated physical risk simultaneously","Net Zero 2050 — requires the most dramatic near-term transition creating maximum stranded asset risk","Hot House World — maximum physical risk is the dominant threat for long-life infrastructure","All three scenarios produce identical combined risk by 2100 under climate equilibrium assumptions"],
   correct:0, explanation:"NGFS Disorderly: delayed policy → more warming (physical risk), then sudden policy shock (high transition risk). This double-hit is widely considered worst for financial stability. Orderly = lower both; Hot House World = max physical but low transition." },

  { question:"A pension fund CIO asks what PACTA (Paris Agreement Capital Transition Assessment) specifically measures and how it differs from a carbon footprint calculation.",
   options:["PACTA compares a portfolio's forward-looking sector exposure (5-year production plans) against IEA decarbonisation pathways — measuring the gap between current plans and Paris-aligned requirements","PACTA measures current portfolio carbon footprint and converts it to tonne-CO₂ equivalents","PACTA is backward-looking historical performance and cannot assess future portfolio alignment","PACTA requires companies to self-report decarbonisation plans — entirely dependent on voluntary disclosure quality"],
   correct:0, explanation:"PACTA: forward-looking alignment tool. Maps portfolio's climate-relevant sector exposure → compares 5-year company production plans to IEA/MPP technology pathways. Key innovation: alignment trajectory, not just current emissions snapshot." },

  { question:"An analyst studying LGIM's climate dashboard approach asks what most distinguishes it from standard ESG scoring overlays used by other asset managers.",

ch8: [
  { question:"A board non-executive director who is a climate scientist challenges a CEO's proposal to commit to 'carbon neutrality by 2045' defined as balancing CO₂ emissions with carbon offsets. What is the most accurate explanation of why this is not equivalent to SBTi net zero?",
   options:["SBTi net zero requires all GHGs (not just CO₂), minimum 90–95% absolute emission reduction before any offsetting, and neutralisation only with permanent carbon removal — offsets without deep cuts do not qualify","Carbon neutrality and net zero are identical terms — the director's challenge is technically incorrect","Net zero is less demanding than carbon neutrality because it covers a wider range of gases","Carbon neutral via certified offsets is automatically equivalent to SBTi net zero regardless of the offset type"],
   correct:0, explanation:"SBTi Corporate Net Zero Standard: min 90–95% value-chain reduction + residual neutralisation with permanent removals. 'Carbon neutral' via offsets does not require deep cuts — this distinction is central to identifying credible vs. performative climate commitments." },

  { question:"An equity research analyst assessing a company's net-zero commitment finds: no SBTi validation, no interim targets, and 50% offset use planned by 2050. Does this constitute a credible net-zero commitment?",

   correct:3, explanation:"Credibility tests: (1) SBTi or equivalent validation, (2) interim targets (2030, 2035), (3) offset use limited to residual after deep absolute cuts. Lacking all three = greenwashing. Race to Zero and SBTi framework distinguish credible from performative commitments." },

  { question:"A public finance specialist studying Germany's net-zero by 2045 strategy asks why the plan still projects ~5% residual emissions requiring CDR, rather than targeting 100% absolute elimination.",

   correct:2, explanation:"Hard-to-abate residual emissions: cement process, certain chemical reactions, agricultural methane/N₂O, and waste sector cannot be fully eliminated regardless of carbon price with current technology. CDR is the only pathway to full net zero for these sectors." },

  { question:"A bank's sustainability team using the GFANZ Financial Institution Net-zero Transition framework identifies the five key elements. The CRO asks which element specifically covers how the institution will engage with clients and policymakers to support the broader economy-wide transition.",
   options:["Metrics and targets — covers all engagement and accountability activity under GFANZ","Foundations — the overarching commitment element covers all stakeholder and policy engagement","Governance — board oversight includes all forms of stakeholder engagement and advocacy","Engagement strategy — specifically covers how the institution works with clients, industry peers, and policymakers to support the transition beyond its own portfolio"],

  { question:"A sustainability specialist explains why L'Oréal's net-zero strategy includes interim milestones rather than only a 2050 endpoint target. Which explanation is most accurate?",

  { question:"A net-zero asset manager asks which combination of portfolio metrics would best track annual progress toward a 2050 portfolio net-zero goal in a way that captures whether investee companies are actually reducing emissions.",
   options:["Total portfolio market capitalisation — larger cap means more resources available for decarbonisation investment","Number of ESG-rated companies as a percentage of total portfolio holdings","Average Sustainalytics ESG risk score across all portfolio holdings","WACI reduction year-on-year, combined with SBT coverage of portfolio companies and engagement progress against a net-zero engagement strategy"],

  { question:"A steel company growing by 30% over the next decade asks whether to adopt a Sectoral Decarbonisation Approach or absolute contraction approach for its Science-Based Target, given its expanding green steel production.",
   options:["Absolute contraction is always the only correct approach — growth does not affect target choice methodology","SDA (intensity targets: tCO₂/tonne steel) accommodates production growth by targeting emission intensity per unit — allows a growing green steel company to expand while decarbonising; absolute contraction would penalise clean production expansion","The company should not set SBTs if production volume is growing","SDA and absolute contraction produce identical results for growing companies — the choice is purely administrative"],

  { question:"A carbon removal startup explains to an investment committee why its direct air capture with geological storage qualifies for SBTi net-zero neutralisation while most forestry offsets do not.",

  { question:"A sovereign wealth fund's compliance team asks whether achieving net-zero portfolio-level metrics necessarily means investee companies have actually achieved net zero.",

function initSudokuGrid(puzzleIdx){
  const p = SUDOKU_PUZZLES[puzzleIdx];
  // Deep copy grid as editable state: each cell {val, fixed, error}
  state.sudokuGrid = p.grid.map(row => row.map(v => ({val: v===0?null:v, fixed: v!==0, error:false})));
  state.sudokuSolution = p.solution;
  state.sudokuSelected = null;
  state.sudokuWon = false;
  state.sudokuErrors = {};
}

function checkSudokuWin(){
  const g = state.sudokuGrid;
  const s = state.sudokuSolution;
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(!g[r][c].val || g[r][c].val !== s[r][c]) return false;
  }
  return true;
}

function initStars(){
  const canvas = document.getElementById("star-canvas");
  if(!canvas) return;
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const count = 320;
  for(let i=0;i<count;i++){
    const x = Math.random()*canvas.width;
    const y = Math.random()*canvas.height*0.82;
    const r = Math.random()*1.4+0.2;
    const a = Math.random()*0.7+0.3;
    // Colour tint: mostly white, some blue/purple/warm
    const hues = [[255,255,255],[200,210,255],[255,220,200],[180,180,255],[255,255,220]];
    const col = hues[Math.floor(Math.random()*hues.length)];
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${a})`;
    ctx.fill();
    // Occasional twinkle cross
    if(Math.random()<0.04){
      ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${a*0.6})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x-r*3,y); ctx.lineTo(x+r*3,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y-r*3); ctx.lineTo(x,y+r*3); ctx.stroke();
    }
  }
}
window.addEventListener("resize",()=>{ if(state.nansMode) initStars(); });

const mCanvas = document.getElementById("meteor-canvas");
const mCtx = mCanvas.getContext("2d");
let meteors = [], meteorRAF = null;
function resizeMC(){mCanvas.width=window.innerWidth;mCanvas.height=window.innerHeight}
window.addEventListener("resize",resizeMC); resizeMC();

function spawnMeteor(){
  meteors.push({
    x: Math.random()*window.innerWidth*1.4,
    y: -10,
    len: 70+Math.random()*120,
    speed: 5+Math.random()*7,
    angle: Math.PI/4+(Math.random()-.5)*.25,
    alpha: 0.5+Math.random()*.5,
    width: 0.6+Math.random()*1.6,
    color: Math.random()>.5 ? [200,160,255] : Math.random()>.5 ? [140,170,255] : [255,240,220],
    life:1,
  });
}
function meteorLoop(){
  mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
  meteors.forEach(m=>{
    const dx=Math.cos(m.angle)*m.len, dy=Math.sin(m.angle)*m.len;
    const g=mCtx.createLinearGradient(m.x,m.y,m.x-dx,m.y-dy);
    g.addColorStop(0,`rgba(${m.color},${m.alpha*m.life})`);
    g.addColorStop(1,`rgba(${m.color},0)`);
    mCtx.beginPath(); mCtx.moveTo(m.x,m.y); mCtx.lineTo(m.x-dx,m.y-dy);
    mCtx.strokeStyle=g; mCtx.lineWidth=m.width; mCtx.stroke();
    mCtx.beginPath(); mCtx.arc(m.x,m.y,m.width*1.8,0,Math.PI*2);
    mCtx.fillStyle=`rgba(255,255,255,${m.alpha*m.life*.9})`; mCtx.fill();
    m.x+=Math.cos(m.angle)*m.speed; m.y+=Math.sin(m.angle)*m.speed;
    if(m.y>mCanvas.height*.65) m.life-=0.05;
  });
  meteors=meteors.filter(m=>m.life>0&&m.y<mCanvas.height+50);
  if(Math.random()<0.05) spawnMeteor();
  meteorRAF=requestAnimationFrame(meteorLoop);
}
function startMeteors(){if(meteorRAF)return;for(let i=0;i<4;i++)spawnMeteor();meteorLoop();}
function stopMeteors(){if(meteorRAF){cancelAnimationFrame(meteorRAF);meteorRAF=null;}mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);meteors=[];}

  cell.val = n===0 ? null : n;

  if(checkSudokuWin()){ state.sudokuWon = true; }
  _render();
};

window.sudokuHint = () => {
  // Fill one random empty cell
  const empties = [];
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(!state.sudokuGrid[r][c].fixed && !state.sudokuGrid[r][c].val) empties.push([r,c]);
  }
  if(!empties.length) return;
  const [r,c] = empties[Math.floor(Math.random()*empties.length)];
  state.sudokuGrid[r][c].val = state.sudokuSolution[r][c];
  state.sudokuGrid[r][c].error = false;
  state.sudokuSelected = [r,c];
  if(checkSudokuWin()){ state.sudokuWon = true; }
  _render();
};

function renderQuiz(){
  const qs=state.questions, cur=state.currentQ, q=qs[cur];
  const pct=(cur/qs.length)*100;
  const r=22, circ=2*Math.PI*r;
  const dash=circ*(1-state.qTimer/Q_TIME);
  const urgent=state.qTimer<=10;
  const opts=q.options.map((o,i)=>{
    let cls="";
    if(state.locked){if(i===q.correct)cls="correct";else if(i===state.selected)cls="wrong";}
    else if(state.selected===i)cls="selected";
    const dot=cls==="correct"?"✓":cls==="wrong"?"✗":LABELS[i];
    return `<button class="opt ${cls} ${state.locked?"locked":""}" onclick="selectOpt(${i})">
      <span class="opt-dot">${dot}</span><span class="opt-text">${o}</span>
    </button>`;
  }).join("");
  const exp=state.locked&&q.explanation?`<div class="explanation">💡 ${q.explanation}</div>`:"";
  const confirmBtn=state.locked?"":
    `<button class="btn btn-gold btn-full" onclick="confirmAnswer()" ${state.selected===null?"disabled":""}>Confirm Answer</button>`;
  const li=LEVEL_INFO[state.currentLevel];
  return `
  <div class="screen has-header" style="flex-direction:column">
    <div class="quiz-header">
      <div class="header-left" style="display:flex;align-items:center;gap:.4rem">
        <button onclick="if(confirm('Exit quiz? Your progress will be lost.'))goBack()" style="background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:.4rem;padding:.15rem .5rem;font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0">✕</button>
        <span class="player-name">${state.playerName}</span>
        ${li?`<span class="tag tag-${li.tagClass.replace("tag-","")}">${li.emoji} ${li.name}</span>`:""}
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <span class="timer-main" id="timer-main">⏱ ${fmt(state.totalTimer)}</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-body"><div class="quiz-inner">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 52 52">
          <g class="ring-arc">
            <circle class="ring-bg" cx="26" cy="26" r="${r}"/>
            <circle id="ring-fg" class="ring-fg${urgent?" urgent":""}" cx="26" cy="26" r="${r}"
              stroke-dasharray="${circ}" stroke-dashoffset="${dash}" style="stroke-dashoffset:${dash}"/>
          </g>
          <text id="ring-num" class="ring-num${urgent?" urgent":""}" x="26" y="30" text-anchor="middle">${state.qTimer}</text>
        </svg>
      </div>
      <div class="q-card">
        <div class="q-label">Question ${cur+1} of ${qs.length}</div>
        <div class="q-text">${q.question}</div>
      </div>
      <div class="options">${opts}</div>
      ${exp}${confirmBtn}
    </div></div>
  </div>`;
}

function renderSudoku(){
  const g = state.sudokuGrid;
  const sel = state.sudokuSelected;
  const puzzle = SUDOKU_PUZZLES[state.sudokuPuzzleIdx];
  const diff_colors = {Easy:'var(--green)',Medium:'var(--gold)',Hard:'#e05555'};
  const diffC = diff_colors[puzzle.difficulty]||'var(--muted)';

  if(state.sudokuWon){
    return `<div class="screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:2rem;text-align:center">
      <div style="font-size:4rem;margin-bottom:.5rem">🎉</div>
      <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold);margin-bottom:.5rem">YOU DID IT!</div>
      <div style="font-size:1.5rem;margin-bottom:.3rem">🧩✨🏆✨🧩</div>
      <div style="color:var(--text);font-size:1.05rem;margin-bottom:.3rem;font-weight:600">Brilliant work, Nancy!</div>
      <div style="color:var(--muted);font-size:.9rem;margin-bottom:.25rem">You solved <strong style="color:var(--gold)">${puzzle.name}</strong></div>
      <div style="color:var(--muted);font-size:.82rem;font-style:italic;margin-bottom:1.8rem">See? Who said you can't take a break AND use your brain? 😏</div>
      <button class="btn btn-gold" style="padding:.9rem 2rem;font-size:1rem;margin-bottom:.75rem" onclick="go('meme')">← Back to the start</button>
      <button class="btn btn-ghost" style="padding:.7rem 1.5rem;font-size:.88rem" onclick="startSudoku()">🔄 Play another</button>
    </div>`;
  }

  // Build 9×9 grid HTML
  let gridHtml = '';
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const cell = g[r][c];
      const isSelected = sel && sel[0]===r && sel[1]===c;
      const isSameNum = sel && !isSelected && cell.val && g[sel[0]][sel[1]].val && cell.val===g[sel[0]][sel[1]].val;
      const isSameBox = sel && (Math.floor(r/3)===Math.floor(sel[0]/3)&&Math.floor(c/3)===Math.floor(sel[1]/3));
      const isSameRowCol = sel && (r===sel[0]||c===sel[1]);
      
      let bg = 'transparent';
      if(isSelected) bg = 'var(--gold)';
      else if(isSameNum) bg = 'rgba(255,193,7,0.25)';
      else if(isSameBox||isSameRowCol) bg = 'var(--surface)';
      
      const textColor = cell.error ? '#e05555' : cell.fixed ? 'var(--text)' : 'var(--purple)';
      const fontW = cell.fixed ? '700' : '600';
      const borderR = c===2||c===5 ? '2.5px solid var(--text)' : '1px solid var(--border2)';
      const borderB = r===2||r===5 ? '2.5px solid var(--text)' : '1px solid var(--border2)';
      
      gridHtml += `<div onclick="sudokuSelect(${r},${c})" style="width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:${bg};border-right:${borderR};border-bottom:${borderB};cursor:${cell.fixed?'default':'pointer'};font-size:clamp(14px,4vw,22px);font-weight:${fontW};color:${textColor};font-family:'DM Mono',monospace;transition:background .1s;user-select:none">${cell.val||''}</div>`;
    }
  }

  // Number pad
  let numPad = '';
  for(let n=1;n<=9;n++){
    numPad += `<button onclick="sudokuInput(${n})" style="width:2.8rem;height:2.8rem;background:var(--surface);border:1.5px solid var(--border);border-radius:.6rem;font-size:1.1rem;font-weight:700;color:var(--text);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s" onmouseover="this.style.background='var(--gold-bg)';this.style.borderColor='var(--gold)'" onmouseout="this.style.background='var(--surface)';this.style.borderColor='var(--border)'">${n}</button>`;
  }
  numPad += `<button onclick="sudokuInput(0)" style="width:2.8rem;height:2.8rem;background:var(--surface);border:1.5px solid var(--border);border-radius:.6rem;font-size:.9rem;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace" title="Erase">✕</button>`;

  return `<div class="screen" style="display:flex;flex-direction:column;align-items:center;min-height:100vh;background:var(--bg);padding:1rem 1rem 2rem">
    <div style="width:100%;max-width:380px">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem;padding-top:.5rem">
        <button class="back-btn" onclick="goBack()" style="background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:.3rem .7rem;flex-shrink:0">← Back</button>
        <div style="flex:1">
          <div style="font-weight:700;color:var(--text);font-size:1rem">${puzzle.name}</div>
          <div style="font-size:.72rem;color:${diffC};font-family:'DM Mono',monospace;font-weight:600">${puzzle.difficulty}</div>
        </div>
        <button onclick="sudokuHint()" style="background:var(--purple-bg);border:1.5px solid var(--purple);border-radius:.6rem;padding:.3rem .65rem;font-size:.78rem;color:var(--purple);cursor:pointer;font-weight:600">💡 Hint</button>
      </div>
      
      <!-- Grid -->
      <div style="display:grid;grid-template-columns:repeat(9,1fr);border:3px solid var(--text);border-radius:.5rem;overflow:hidden;margin-bottom:1.2rem">
        ${gridHtml}
      </div>
      
      <!-- Number pad -->
      <div style="display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;margin-bottom:1.2rem">
        ${numPad}
      </div>

      <div style="font-size:.72rem;color:var(--muted);text-align:center;font-family:'DM Mono',monospace">
        Tap a cell, then tap a number · Purple = your answers · 💡 Hint fills one cell
      </div>
    </div>
  </div>`;
}

function _render(){
  const s=state.screen;
  let html="";
  if(s==="loading")html=renderLoading();
  else if(s==="landing")html=renderLanding();
  else if(s==="pin")html=renderPin();
  else if(s==="meme")html=renderMeme();
  else if(s==="learn")html=renderLearn();
  else if(s==="levels")html=renderLevels();
  else if(s==="quiz")html=renderQuiz();
  else if(s==="celebration")html=renderCelebration();
  else if(s==="admin")html=renderAdmin();
  else if(s==="trivia")html=renderTrivia();
  else if(s==="sudoku")html=renderSudoku();
  else if(s==="results")html=renderResults();
  R().innerHTML=html;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
window.go = async(screen) => {
  clearTimers();
  // Push current screen to history before navigating (except loading/pin)
  if(state.screen && state.screen!=="loading" && state.screen!=="pin") {
    state.navHistory = [...(state.navHistory||[]), state.screen];
    if(state.navHistory.length > 15) state.navHistory = state.navHistory.slice(-15);
  }
  if(screen==="admin"&&!state.adminUnlocked){state.screen="pin";_render();return;}
  if(screen==="admin"){
    state.adminTab="chapter";
    const [scores,ch,comments,brand] = await Promise.all([dbGetScores(),dbGetChapter(),dbGetComments(),dbGetActiveBrand()]);
    state.adminScores=scores; state.activeChapter=ch; state.adminComments=comments; state.activeBrand=brand;
    state.questions=(()=>{const m=LEVEL_Q_MAP[ch]||LEVEL_Q_MAP[1];return [...m.squirtle,...m.charizard,...m.mewtwo].slice(0,5);})();
  }
  if(screen==="levels"){
    const rwUnlocked = await dbGetRealWorldUnlocked();
    state.realWorldUnlocked = rwUnlocked;
  }
  state.screen=screen; _render();
};

window.goBack = () => {
  const hist = state.navHistory||[];
  if(!hist.length){ state.screen="landing"; _render(); return; }
  const prev = hist[hist.length-1];
  state.navHistory = hist.slice(0,-1);
  // Restore learn sub-screen if going back to learn
  if(prev==="learn" && state.learnScreen==="story") { state.learnScreen="concepts"; _render(); return; }
  if(prev==="learn" && state.learnScreen==="concepts") { state.learnScreen="chapters"; _render(); return; }
  state.screen=prev; _render();
};

// ── PIN ───────────────────────────────────────────────────────────────────────
window.checkPin = () => {
  const v=document.getElementById("pinInput")?.value;
  if(v===ADMIN_PIN){
    state.adminUnlocked=true;
    Promise.all([dbGetScores(),dbGetChapter(),dbGetComments()]).then(([scores,ch,comments])=>{
      state.adminScores=scores; state.activeChapter=ch; state.adminComments=comments;
      state.adminTab="chapter"; state.screen="admin"; _render();
    });
  } else {
    const inp=document.getElementById("pinInput"),err=document.getElementById("pinErr");
    inp.classList.add("error"); err.classList.remove("hidden"); inp.value="";
    setTimeout(()=>{inp.classList.remove("error");err.classList.add("hidden");},1500);
  }
};

// ── CHAPTER ───────────────────────────────────────────────────────────────────
window.setChapter = async(ch) => {
  state.activeChapter=ch;

  const ok=await dbSetChapter(ch);

// ── LEVEL SELECT ──────────────────────────────────────────────────────────────
window.choosePlayer = (name) => { state.playerName = name; go('levels'); };
window.startLevel = async(level) => {
  if(LEVEL_INFO[level]?.locked && !(level==='realworld' && state.realWorldUnlocked)) return;
  const ch = await dbGetChapter();
  state.activeChapter = ch;
  // Sync selectedQs for this chapter
  state.selectedQs = ch===2 ? (state._selectedQsCh2||{squirtle:[0,1,2,3,4],charizard:[0,1,2,3,4],mewtwo:[0,1,2,3,4]}) : (state._selectedQsCh1||{squirtle:[0,1,2,3,4],charizard:[0,1,2,3,4],mewtwo:[0,1,2,3,4]});
  let qs;
  if(level === 'realworld'){
    const rwBank = getQBank(ch);
    const rwQs = rwBank['realworld']||[];
    qs = rwQs.length ? rwQs : (ch===2 ? LEVEL_Q_RW.ch2 : LEVEL_Q_RW.ch1);
  } else {
    const bank = getQBank(ch);
    const allQs = bank[level] || [];
    const idxs = (state.selectedQs && state.selectedQs[level]) || [0,1,2,3,4];
    qs = idxs.filter(i=>i<allQs.length).map(i=>allQs[i]).filter(Boolean);
    if(qs.length < 1) qs = allQs.slice(0,5); // fallback
  }
  state.currentLevel=level; state.questions=qs;
  state.currentQ=0; state.answers=[]; state.selected=null;
  state.locked=false; state.totalTimer=QUIZ_TIME; state.qTimer=Q_TIME;
  state.screen="quiz"; _render(); startTimers();
};

// ── TIMER DOM UPDATE ──────────────────────────────────────────────────────────
function updateTimerDOM(){
  if(state.screen!=="quiz")return;
  const mainEl=document.getElementById("timer-main");
  if(mainEl){mainEl.textContent="⏱ "+fmt(state.totalTimer);mainEl.className="timer-main"+(state.totalTimer<120?" urgent":"");}
  const r=22,circ=2*Math.PI*r,dash=circ*(1-state.qTimer/Q_TIME),urgent=state.qTimer<=10;
  const fg=document.getElementById("ring-fg"),num=document.getElementById("ring-num");
  if(fg){fg.style.strokeDashoffset=dash;fg.className.baseVal="ring-fg"+(urgent?" urgent":"");}
  if(num){num.textContent=state.qTimer;num.className.baseVal="ring-num"+(urgent?" urgent":"");}
}
function clearTimers(){clearInterval(state.totalTimerRef);clearInterval(state.qTimerRef);}
function startTimers(){
  clearTimers();
  state.totalTimerRef=setInterval(()=>{state.totalTimer--;if(state.totalTimer<=0){clearTimers();finishQuiz(state.answers,true);return;}updateTimerDOM();},1000);
  startQTimer();
}
function startQTimer(){
  clearInterval(state.qTimerRef); state.qTimer=Q_TIME;
  state.qTimerRef=setInterval(()=>{state.qTimer--;if(state.qTimer<=0){clearInterval(state.qTimerRef);autoNext();return;}updateTimerDOM();},1000);
}

// ── QUIZ LOGIC ────────────────────────────────────────────────────────────────
window.selectOpt=(i)=>{if(state.locked)return;state.selected=i;_render();};
window.confirmAnswer=()=>{
  if(state.selected===null||state.locked)return;
  clearInterval(state.qTimerRef); state.locked=true;
  const a=[...state.answers];
  a[state.currentQ]={sel:state.selected,ok:state.selected===state.questions[state.currentQ].correct};
  state.answers=a; _render();
  const last=state.currentQ===state.questions.length-1;
  setTimeout(()=>last?finishQuiz(a):nextQ(a),1800);
};
function autoNext(){
  if(state.locked)return; state.locked=true;
  const a=[...state.answers]; a[state.currentQ]={sel:null,ok:false}; state.answers=a; _render();
  const last=state.currentQ===state.questions.length-1;
  setTimeout(()=>last?finishQuiz(a):nextQ(a),1500);
}
function nextQ(a){state.currentQ++;state.selected=null;state.locked=false;state.answers=a;_render();startQTimer();}

async function finishQuiz(a){
  clearTimers();
  const score=a.filter(x=>x?.ok).length;
  const time=fmt(QUIZ_TIME-state.totalTimer);
  const now=new Date();
  const li=LEVEL_INFO[state.currentLevel];
  // Prune scores older than 12 hours
  const cutoff = Date.now() - 12*60*60*1000;
  const entry={
    name:state.playerName, level:li?.name||"Classic",
    chapter:state.activeChapter,
    score, total:state.questions.length, time,
    date:now.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
    timestamp:now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true}),
    ts: Date.now()
  };
  await dbAddScore(entry);
  // Prune old scores
  try{
    const all = await dbGetScoresRaw();
    if(all){
      const keys = Object.keys(all);
      for(const k of keys){ if((all[k].ts||0) < cutoff){ try{await remove(ref(db,"scores/"+k));}catch(e){} } }
    }
  }catch(e){}
  state.result={score,total:state.questions.length,answers:a,questions:state.questions,time};
  state.screen = "trivia";
  _render();
}


// ── Q SELECTOR ────────────────────────────────────────────────────────────────
window.adminToggleQ = async(level, idx, checked, ch) => {
  const chKey = ch===2 ? '_selectedQsCh2' : '_selectedQsCh1';
  if(!state[chKey]) state[chKey] = {squirtle:[0,1,2,3,4],charizard:[0,1,2,3,4],mewtwo:[0,1,2,3,4]};
  let sel = [...(state[chKey][level]||[0,1,2,3,4])];
  if(checked){
    if(sel.length >= 5){ state.adminFlash="✗ Max 5 questions per level"; _render(); setTimeout(()=>{state.adminFlash="";_render();},2000); return; }
    if(!sel.includes(idx)) sel.push(idx);
  } else {
    if(sel.length <= 1){ state.adminFlash="✗ Must keep at least 1"; _render(); setTimeout(()=>{state.adminFlash="";_render();},2000); return; }
    sel = sel.filter(i=>i!==idx);
  }
  sel.sort((a,b)=>a-b);
  state[chKey][level] = sel;
  // Sync active chapter
  if(ch === state.activeChapter) state.selectedQs = {...state[chKey]};
  await dbSetSelectedQs(level, sel, ch);
  state.adminFlash="✓ Selection saved!";
  _render(); setTimeout(()=>{state.adminFlash="";_render();},1500);
};

// ── DOC IMPORT ────────────────────────────────────────────────────────────────
window.adminImportDoc = (input) => {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const parsed = parseQuestionsFromText(text);
    state.docImportPreview = parsed;
    if(!parsed.length) state.adminFlash = "✗ No questions found. Check format.";
    _render();
    input.value="";
  };
  reader.readAsText(file);
};

function parseQuestionsFromText(text){
  const qs = [];
  // Split by blank lines or Q: markers
  const blocks = text.split(/\n\s*\n/).filter(b=>b.trim());
  for(const block of blocks){
    const lines = block.trim().split("\n").map(l=>l.trim()).filter(Boolean);
    let question="",options=[],correct=0,explanation="";
    for(const line of lines){
      if(/^Q:/i.test(line)) question = line.replace(/^Q:\s*/i,"").trim();
      else if(/^A:/i.test(line)) options[0] = line.replace(/^A:\s*/i,"").trim();
      else if(/^B:/i.test(line)) options[1] = line.replace(/^B:\s*/i,"").trim();
      else if(/^C:/i.test(line)) options[2] = line.replace(/^C:\s*/i,"").trim();
      else if(/^D:/i.test(line)) options[3] = line.replace(/^D:\s*/i,"").trim();
      else if(/^CORRECT:/i.test(line)){
        const ans = line.replace(/^CORRECT:\s*/i,"").trim().toUpperCase();
        correct = {A:0,B:1,C:2,D:3}[ans]||0;
      }
      else if(/^EXP:/i.test(line)) explanation = line.replace(/^EXP:\s*/i,"").trim();
    }
    if(question && options.length>=2) qs.push({question,options,correct,explanation});
  }
  return qs;
}

window.adminConfirmImport = async() => {
  const qs = state.docImportPreview;
  if(!qs||!qs.length) return;
  const lvl = state.docImportLevel||"squirtle";
  const ch = parseInt(state.docImportChapter||1);
  const bank = getQBank(ch);
  if(!bank[lvl]) bank[lvl]=[];
  bank[lvl].push(...qs);
  // Also sync to LEVEL_Q_MAP so startLevel sees it immediately
  if(!LEVEL_Q_MAP[ch]) LEVEL_Q_MAP[ch]={squirtle:[],charizard:[],mewtwo:[],realworld:[]};
  if(!LEVEL_Q_MAP[ch][lvl]) LEVEL_Q_MAP[ch][lvl]=[];
  LEVEL_Q_MAP[ch][lvl].push(...qs);
  state.docImportPreview = null;
  const lvlName = (LEVEL_INFO[lvl]||{name:"Real World"}).name;
  state.adminFlash = `✓ ${qs.length} question(s) added to ${lvlName} Ch.${ch}!`;
  _render(); setTimeout(()=>{state.adminFlash="";_render();},3000);
};

// Load concept done state on startup
(async()=>{ const d=await dbGetConceptDone(); state.conceptDoneMap=d||{}; })();

window.adminImportLearnDoc = (input) => {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const parsed = parseConceptsFromText(text);
    state.learnImportPreview = parsed;
    _render();
  };
  reader.readAsText(file);

function parseConceptsFromText(text){
  const blocks = text.split(/\n\s*\n/);
  const results=[];
  for(const block of blocks){
    if(!block.trim()) continue;
    const get=(key)=>{const m=block.match(new RegExp('^'+key+':\\s*(.+)','im'));return m?m[1].trim():'';};
    const storyMatch = block.match(/^STORY:\s*([\s\S]+?)(?=\n[A-Z]+:|$)/im);
    const story = storyMatch ? '<p>'+storyMatch[1].trim().replace(/\n/g,'</p><p>')+'</p>' : '';
    const title=get('TITLE'); if(!title) continue;
    const ch = state.learnImportChapter||1;
    results.push({
      id:'import_'+Date.now()+'_'+results.length,
      section:get('SECTION')||'Imported',
      title, emoji:get('EMOJI')||'📌',
      summary:get('SUMMARY')||title,
      story:story||`<p>${get('SUMMARY')||title}</p>`
    });
  }
  return results;
}
window.adminConfirmLearnImport = () => {
  const ch = parseInt(state.learnImportChapter||1);
  const key='ch'+ch;
  const toAdd = state.learnImportPreview||[];
  CONCEPT_BANK[key].push(...toAdd);
  if(!state.learnConfig) state.learnConfig = JSON.parse(JSON.stringify(LEARN_CONFIG_DEFAULT));
  if(!state.learnConfig[key]) state.learnConfig[key]={activeConceptIds:[]};
  state.learnConfig[key].activeConceptIds=[...state.learnConfig[key].activeConceptIds,...toAdd.map(c=>c.id)];
  state.learnImportPreview=[];
  state.adminFlash=`✓ Added ${toAdd.length} concept(s) to Ch.${ch}!`;
  // Also ensure ch key exists in learnConfig for ch3+
  if(!CONCEPT_BANK[key]) CONCEPT_BANK[key]=[];
  _render(); setTimeout(()=>{state.adminFlash='';_render();},2500);
};
// ── BOOT ──────────────────────────────────────────────────────────────────────
(async()=>{
  try {
    const [ch, rwUnlocked, brand, txtCfg, lrnCfg, cStats] = await Promise.all([
      dbGetChapter(), dbGetRealWorldUnlocked(), dbGetActiveBrand(), dbGetTextConfig(), dbGetLearnConfig(), dbGetConceptStats()
    ]);
    state.activeChapter = ch;
    state.realWorldUnlocked = rwUnlocked;
    state.activeBrand = brand;
    if(txtCfg && Object.keys(txtCfg).length) state.textConfig = Object.assign({}, txtCfg);
    if(lrnCfg && Object.keys(lrnCfg).length) state.learnConfig = Object.assign(JSON.parse(JSON.stringify(LEARN_CONFIG_DEFAULT)), lrnCfg);
    if(cStats && Object.keys(cStats).length) state.conceptStats = cStats;
    // Load selectedQs for all levels+chapters
    const levels = ['squirtle','charizard','mewtwo'];
    const chs = [1,2];
    const qResults = await Promise.all(levels.flatMap(l=>chs.map(c=>dbGetSelectedQs(l,c).then(v=>({l,c,v})))));
    const sq={squirtle:[0,1,2,3,4],charizard:[0,1,2,3,4],mewtwo:[0,1,2,3,4]};
    const sq2={squirtle:[0,1,2,3,4],charizard:[0,1,2,3,4],mewtwo:[0,1,2,3,4]};
    qResults.forEach(({l,c,v})=>{ if(c===1) sq[l]=v; else sq2[l]=v; });
    state.selectedQs = ch===2 ? sq2 : sq;
    state._selectedQsCh1 = sq; state._selectedQsCh2 = sq2;
  } catch(e) { state.activeChapter = 1; state.realWorldUnlocked = false; state.activeBrand = "sisley"; }
  state.screen="landing"; _render();
  // Handle ?admin=1 URL param (from admin/index.html shortcut)
  if(window.location.search.includes('admin=1')){
    setTimeout(()=>{ window.go('pin'); },100);
  }
})();
} // end _initApp
