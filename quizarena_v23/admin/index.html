<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizArena — Admin</title>
<style>
body{margin:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif,system-ui}
.card{background:#fff;border-radius:1rem;padding:2rem;text-align:center;max-width:320px;width:90%}
h2{font-size:1.4rem;margin-bottom:.5rem;color:#1a1a2e}
p{color:#6b6878;font-size:.88rem;margin-bottom:1.5rem;line-height:1.6}
.btn{display:inline-block;padding:.8rem 2rem;border-radius:.75rem;background:linear-gradient(135deg,#c8860a,#a06808);color:#fff;font-weight:700;text-decoration:none;font-size:.95rem;transition:filter .15s}
.btn:hover{filter:brightness(1.1)}
.hint{margin-top:1rem;font-size:.78rem;color:#b0adb8}
code{background:#f4f2ee;border:1px solid #ccc9c0;border-radius:.3rem;padding:.1rem .4rem;font-size:.82rem}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:2rem;margin-bottom:.5rem">⚙️</div>
  <h2>Admin Panel</h2>
  <p>This will open QuizArena and take you directly to the admin panel. You'll need the PIN to enter.</p>
  <a href="../index.html?admin=1" class="btn">Open Admin →</a>
  <div class="hint">Default PIN: <code>0809</code></div>
</div>
<script>
  // Auto-redirect to main app with admin flag
  window.location.href = '../index.html?admin=1';
</script>
</body>
</html>
